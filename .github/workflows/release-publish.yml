# Release Publish — triggers when Release Please creates a GitHub Release,
# rebuilds from clean state, packages the extension zip, and uploads to the release.
# Also supports manual dispatch for smoke testing and re-runs.
#
# Guardrails enforced:
#   GR-1: Only runs for extension release tags
#   GR-2: Checks out the release tag for reproducible builds
#   GR-3: Validates version alignment between package.json and manifest.json
#   GR-4: Explicit minimal permissions

name: Release Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish (e.g. extension-v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  publish:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
    # GR-1: only run for extension releases
    if: startsWith(github.event.release.tag_name || inputs.tag_name, 'extension-v')

    steps:
      # GR-2: checkout the release tag for reproducible builds
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up pnpm
        id: setup-pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        id: install-deps
        run: pnpm install --frozen-lockfile

      - name: Run build
        id: build
        run: pnpm --filter @vxrtx/extension build

      # GR-3: validate version alignment
      - name: Validate version alignment
        id: validate-versions
        run: |
          node -e "
            const pkg = require('./apps/extension/package.json');
            const manifest = require('./apps/extension/public/manifest.json');
            if (pkg.version !== manifest.version) {
              console.log('::error::Version mismatch: package.json=' + pkg.version + ' manifest.json=' + manifest.version);
              process.exit(1);
            }
            console.log('Versions aligned: ' + pkg.version);
          "

      - name: Package extension zip
        id: package-zip
        run: pnpm --filter @vxrtx/extension package:zip

      - name: Upload release artifact
        id: upload-artifact
        run: gh release upload "$RELEASE_TAG" apps/extension/vxrtx-extension-*.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Phase 2: Chrome Web Store draft upload.
  # Runs as a separate job so CWS failures don't affect the GitHub Release.
  # Skipped entirely until CWS_EXTENSION_ID is configured as a repository variable.
  cws-upload:
    name: Upload to Chrome Web Store
    runs-on: ubuntu-latest
    needs: publish
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
    if: vars.CWS_EXTENSION_ID != ''

    steps:
      - name: Download release artifact
        id: download-artifact
        run: gh release download "$RELEASE_TAG" --pattern "vxrtx-extension-*.zip" --dir .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Upload draft to Chrome Web Store
        id: cws-upload
        run: npx chrome-webstore-upload-cli@3.5.0 upload --source vxrtx-extension-*.zip --auto-publish false
        env:
          EXTENSION_ID: ${{ vars.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
