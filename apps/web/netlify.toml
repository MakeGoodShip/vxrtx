[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @vxrtx/web build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22"

# SPA-style fallback not needed — Astro generates static HTML
# But redirect www to apex
[[redirects]]
  from = "https://www.vxrtx.com/*"
  to = "https://vxrtx.com/:splat"
  status = 301
  force = true

# Cache static assets aggressively
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
